<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wealth Tax Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #e8e4dc;
    --bg-card: #f0ede6;
    --green-dark: #2d4a2d;
    --green-mid: #3d6b3d;
    --green-light: #5a8a5a;
    --green-pale: #8faf8f;
    --green-muted: #c5d5c5;
    --green-tint: #dce8dc;
    --accent: #4a7c4a;
    --text: #1a2e1a;
    --text-muted: #4a6040;
    --border: #b5c9b5;
    --correct: #2d6a2d;
    --correct-bg: #d4e8d4;
    --wrong: #7a2d2d;
    --wrong-bg: #f0d4d4;
    --wrong-border: #c87878;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Serif 4', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  .page-wrapper {
    max-width: 820px;
    margin: 0 auto;
  }

  /* ── Header ── */
  .header {
    border-top: 3px solid var(--green-dark);
    border-bottom: 1px solid var(--border);
    padding: 28px 0 22px;
    margin-bottom: 40px;
  }

  .header h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 700;
    color: var(--green-dark);
    line-height: 1.25;
    margin-bottom: 12px;
  }

  .header p {
    font-size: 1rem;
    color: var(--text-muted);
    font-style: italic;
    line-height: 1.6;
  }

  /* ── Quiz Section ── */
  .section-label {
    font-family: 'Playfair Display', serif;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--green-light);
    margin-bottom: 16px;
  }

  .quiz-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-left: 4px solid var(--green-mid);
    border-radius: 2px;
    padding: 28px 32px;
    margin-bottom: 20px;
    transition: border-left-color 0.3s;
  }

  .quiz-card.answered-correct { border-left-color: var(--correct); }
  .quiz-card.answered-wrong { border-left-color: var(--wrong-border); }

  .question-number {
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--green-pale);
    font-family: 'Playfair Display', serif;
    margin-bottom: 10px;
  }

  .question-text {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--green-dark);
    line-height: 1.55;
    margin-bottom: 20px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 2px;
    padding: 12px 16px;
    cursor: pointer;
    font-family: 'Source Serif 4', serif;
    font-size: 0.95rem;
    color: var(--text);
    text-align: left;
    transition: all 0.2s ease;
    line-height: 1.5;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--green-mid);
    background: var(--green-tint);
    color: var(--green-dark);
  }

  .option-btn:disabled { cursor: default; }

  .option-btn.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
    color: var(--correct);
    font-weight: 600;
  }

  .option-btn.wrong {
    border-color: var(--wrong-border);
    background: var(--wrong-bg);
    color: var(--wrong);
  }

  .option-letter {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--green-muted);
    color: var(--green-dark);
    font-size: 0.72rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    margin-top: 1px;
  }

  .option-btn.correct .option-letter { background: var(--correct); color: #fff; }
  .option-btn.wrong .option-letter { background: var(--wrong-border); color: #fff; }

  .feedback {
    margin-top: 14px;
    padding: 12px 16px;
    border-radius: 2px;
    font-size: 0.9rem;
    line-height: 1.6;
    display: none;
  }

  .feedback.show { display: block; }
  .feedback.correct { background: var(--correct-bg); color: var(--correct); border-left: 3px solid var(--correct); }
  .feedback.wrong { background: var(--wrong-bg); color: var(--wrong); border-left: 3px solid var(--wrong-border); }

  /* ── Score ── */
  .score-bar {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 20px 28px;
    margin: 28px 0 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .score-label {
    font-family: 'Playfair Display', serif;
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .score-display {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--green-dark);
  }

  .score-track {
    flex: 1;
    min-width: 140px;
    height: 6px;
    background: var(--green-muted);
    border-radius: 3px;
    overflow: hidden;
  }

  .score-fill {
    height: 100%;
    background: var(--green-mid);
    border-radius: 3px;
    transition: width 0.5s ease;
    width: 0%;
  }

  .reset-btn {
    background: var(--green-dark);
    color: #fff;
    border: none;
    padding: 10px 22px;
    font-family: 'Playfair Display', serif;
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s;
  }

  .reset-btn:hover { background: var(--green-mid); }

  /* ── Divider ── */
  .section-divider {
    border: none;
    border-top: 2px solid var(--border);
    margin: 8px 0 40px;
  }

  /* ── Bullet Points ── */
  .bullets-section h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--green-dark);
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .bullets-section > p {
    font-size: 0.95rem;
    color: var(--text-muted);
    font-style: italic;
    margin-bottom: 28px;
    line-height: 1.6;
  }

  .bullets-intro {
    font-size: 1rem;
    line-height: 1.75;
    color: var(--text);
    margin-bottom: 24px;
  }

  .bullet-group {
    margin-bottom: 28px;
    padding-left: 0;
  }

  .bullet-group-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--green-dark);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .bullet-group-title .num-badge {
    background: var(--green-dark);
    color: #fff;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-family: 'Source Serif 4', serif;
    flex-shrink: 0;
  }

  .bullet-group p {
    font-size: 0.95rem;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 10px;
    padding-left: 32px;
  }

  .bullet-list {
    list-style: none;
    padding-left: 32px;
    margin-bottom: 10px;
  }

  .bullet-list li {
    font-size: 0.95rem;
    line-height: 1.7;
    color: var(--text);
    padding: 3px 0 3px 16px;
    position: relative;
  }

  .bullet-list li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 13px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green-pale);
  }

  .conclusion {
    background: var(--green-tint);
    border: 1px solid var(--green-muted);
    border-left: 4px solid var(--green-mid);
    border-radius: 2px;
    padding: 18px 22px;
    margin-top: 8px;
    font-size: 0.95rem;
    line-height: 1.7;
    color: var(--green-dark);
  }

  @media (max-width: 600px) {
    .quiz-card { padding: 20px 18px; }
    .score-bar { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="page-wrapper">

  <!-- Header -->
  <div class="header">
    <h1>Why have countries been getting rid of wealth taxes?</h1>
    <p>Test your understanding, then review the key points below.</p>
  </div>

  <!-- Quiz -->
  <div class="section-label">Interactive Quiz</div>

  <div id="quiz-container"></div>

  <div class="score-bar">
    <div>
      <div class="score-label">Your score</div>
      <div class="score-display"><span id="score-num">0</span> / <span id="score-total">0</span></div>
    </div>
    <div class="score-track"><div class="score-fill" id="score-fill"></div></div>
    <button class="reset-btn" onclick="resetQuiz()">Reset Quiz</button>
  </div>



</div>

<script>
const questions = [
  {
    q: "How many OECD countries had a wealth tax in 1990, and how many still have one today?",
    options: [
      "20 countries in 1990, down to 10 today",
      "12 countries in 1990, down to 3 today",
      "8 countries in 1990, down to 1 today",
      "15 countries in 1990, down to 5 today"
    ],
    answer: 1,
    feedback: {
      correct: "Correct! In 1990, 12 OECD countries had a wealth tax. Today only 3 still do — a dramatic decline that reflects the economic, administrative and political pressures covered on this page.",
      wrong: "The correct figures are 12 OECD countries in 1990, falling to just 3 today — showing how dramatically wealth taxes have fallen out of favour over the past few decades."
    }
  },
  {
    q: "Which combination of factors does the evidence suggest best explains why OECD countries moved away from wealth taxes?",
    options: [
      "High revenue yields made them unnecessary once inequality fell",
      "Economic distortions, administrative complexity, and political opposition working together",
      "International agreements requiring countries to harmonise their tax systems",
      "Technological changes made it impossible to track wealth accurately"
    ],
    answer: 1,
    feedback: {
      correct: "Correct! No single factor explains the retreat from wealth taxes — it was the combination of economic inefficiencies, the difficulty of administration, and sustained political pressure that together made governments conclude the costs outweighed the benefits.",
      wrong: "The evidence points to a combination: economic distortions, high administrative complexity, and organised political opposition all reinforced each other in pushing governments away from wealth taxes."
    }
  },
  {
    q: "Why does financial globalisation make it harder for governments to sustain wealth taxes?",
    options: [
      "Global financial markets make asset valuations more straightforward",
      "International tax treaties prevent countries from taxing foreign-held assets",
      "Wealthy individuals can more easily move themselves or their assets to lower-tax jurisdictions",
      "Globalisation increases the number of people subject to wealth taxes"
    ],
    answer: 2,
    feedback: {
      correct: "Correct! As financial markets became more integrated, it became easier for high-net-worth individuals to shift assets — or residency — abroad, making governments increasingly worried about losing mobile wealth and investment.",
      wrong: "Globalisation increases the mobility of capital and wealthy individuals. This means governments risk losing both high-net-worth residents and investment to lower-tax countries if they impose wealth taxes."
    }
  },
  {
    q: "Asset valuation is described as a key administrative challenge. Which of the following best explains why?",
    options: [
      "Most wealthy individuals do not own any physical assets",
      "Governments lack the legal authority to assess private wealth",
      "Asset values change over time and exemptions create opportunities for avoidance, driving up costs",
      "Valuation is straightforward but taxpayers refuse to cooperate"
    ],
    answer: 2,
    feedback: {
      correct: "Correct! The value of assets like property, private businesses, and art changes constantly, and the availability of exemptions and reliefs creates significant scope for avoidance — making the tax both costly to enforce and easy to game.",
      wrong: "The challenge is that asset values fluctuate over time, and the availability of exemptions and reliefs makes avoidance easier — resulting in high enforcement costs relative to the modest revenue collected."
    }
  },
  {
    q: "Why might the political economy of wealth taxes make them especially difficult to sustain over time?",
    options: [
      "Ordinary voters strongly oppose wealth taxes because they expect to become wealthy",
      "Those most affected — high-wealth individuals — tend to be politically influential and organised",
      "Political parties across the spectrum have always agreed wealth taxes are inefficient",
      "Wealth taxes are too popular with voters, making them hard to reform without backlash"
    ],
    answer: 1,
    feedback: {
      correct: "Correct! Wealth taxes fall on a group — high-wealth individuals — who are often politically engaged and influential. This creates sustained, organised pressure for reform or repeal that most governments struggle to resist over time.",
      wrong: "The political economy problem is that wealth taxes target a group with significant political influence. High-wealth individuals tend to be well-organised and politically engaged, creating sustained pressure for repeal."
    }
  },
  {
    q: "How did the broad shift in tax policy during the 1980s and 1990s contribute to the decline of wealth taxes?",
    options: [
      "Governments replaced wealth taxes with higher corporate taxes instead",
      "A move toward lower capital taxation and greater reliance on consumption and income taxes made wealth taxes less ideologically aligned with prevailing policy",
      "The IMF required all member countries to abolish wealth taxes as a condition of membership",
      "Rising inflation during this period made wealth taxes too unpredictable to administer"
    ],
    answer: 1,
    feedback: {
      correct: "Correct! The 1980s and 1990s saw a broader ideological shift toward lower taxation of capital. This made wealth taxes — a direct tax on the stock of capital — increasingly out of step with the prevailing direction of tax policy across OECD countries.",
      wrong: "During the 1980s and 1990s, many governments shifted toward lower capital taxation and greater reliance on income and consumption taxes. This ideological shift made wealth taxes increasingly incompatible with the direction of mainstream tax policy."
    }
  }
];

let answered = [];
let score = 0;

function buildQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  answered = new Array(questions.length).fill(false);
  score = 0;
  updateScore();

  questions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'quiz-card';
    card.id = `card-${qi}`;

    const letters = ['A','B','C','D'];
    const optionsHTML = q.options.map((opt, oi) => `
      <button class="option-btn" id="opt-${qi}-${oi}" onclick="selectAnswer(${qi}, ${oi})">
        <span class="option-letter">${letters[oi]}</span>
        <span>${opt}</span>
      </button>
    `).join('');

    card.innerHTML = `
      <div class="question-number">Question ${qi + 1} of ${questions.length}</div>
      <div class="question-text">${q.q}</div>
      <div class="options">${optionsHTML}</div>
      <div class="feedback" id="fb-${qi}"></div>
    `;
    container.appendChild(card);
  });

  document.getElementById('score-total').textContent = questions.length;
}

function selectAnswer(qi, oi) {
  if (answered[qi]) return;
  answered[qi] = true;

  const q = questions[qi];
  const card = document.getElementById(`card-${qi}`);
  const fb = document.getElementById(`fb-${qi}`);
  const isCorrect = oi === q.answer;

  // Disable all buttons for this question
  for (let i = 0; i < q.options.length; i++) {
    const btn = document.getElementById(`opt-${qi}-${i}`);
    btn.disabled = true;
    if (i === q.answer) btn.classList.add('correct');
    else if (i === oi && !isCorrect) btn.classList.add('wrong');
  }

  // Show feedback
  fb.className = `feedback show ${isCorrect ? 'correct' : 'wrong'}`;
  fb.innerHTML = `<strong>${isCorrect ? '✓ Correct' : '✗ Incorrect'}:</strong> ${isCorrect ? q.feedback.correct : q.feedback.wrong}`;

  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');

  if (isCorrect) score++;
  updateScore();
}

function updateScore() {
  const total = questions.length;
  const answeredCount = answered.filter(Boolean).length;
  document.getElementById('score-num').textContent = score;
  const pct = total > 0 ? (score / total) * 100 : 0;
  document.getElementById('score-fill').style.width = pct + '%';
}

function resetQuiz() {
  buildQuiz();
}

buildQuiz();
</script>
</body>
</html>
